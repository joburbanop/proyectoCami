<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camii MakeUp</title>
    <link rel="icon" type="image/png" href="imagenes/LogoMarcaPersonal.png">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="body">
    
    <header class="hero">
        <div class="hero-menu">
            <div class="menu-contenedor">
                <div class="menu-imagen active">
                <!---<img src="imagenes/SVG/menu.svg" alt="menu" id="buger-button">-->
                <span class="icon-menu desactive" id="buger-button"></span>
                <i class="icon-x active" id="x-button" ></i>
            </div>
                <nav class="navegacio-menu deactivate">
                    <ul>
                        <li>
                            <a href="#inicio"><strong>inicio</strong></a>
                        </li>
                        <li>
                            <a href="#servicios"><strong> servicios</strong> </a>
                        </li>
                        <li>
                            <a href="#consejos"><strong>consejos</strong></a>
                        </li>
                        <li>
                            <a href="#contatos"><strong>contactame</strong></a>
                        </li>
                    </ul>
                </nav>
            </div>
            <div class="logo-imagen">
                <picture>
                    <img src="imagenes/LogoMarcaPersonal.png" width="200" height="200" alt="logo">   
                </picture>
            </div>
        </div>
    </header>
    
    <section class="principal-imgen" id="inicio">
        <figure>
            <img src="imagenes/imagenPrincipal2.png" >
        </figure>
        <div>
            <p>
                <h1>BEINVENIDAS  Y BIENVENIDOS <br> <br> Vive tu mejor experiencia tranformando tu día</h1>
            </p>
        </div>
        <picture>
            <img src="imagenes/imagenPrincipal.jpg">
        </picture>    
        
    </section>

    <section class="sub-hero">
        <p><h1> Camii <strong>MakeUp</strong></h1></p>
    

    </section>
    
    <section class="section-servicios" id="sevicios">
        <div class="titulo-servicios">
            <h1> 
                servicios
            </h1>
            <div class="descripcion-servicios">
                <p>descripcion</p>
            </div>
            <div class="videos-servicios">
                <p>video</p>
            </div>
        </div>
        <div class="servicios-pestrados">
            <nav>
                <ul>
                    <li>
                        <h2>maquillaje social</h2>
                    </li>
                    <li>
                        <h2>maquillaje de novia</h2>
                    </li>
                    <li>
                        <h2>maquillaje de quinceañera</h2>
                    </li>
                </ul>
            </nav>
        </div>
    </section>
    
    <section class="section-consejos" id="consejos">
        <h3>consejos</h3>
    </section>

    <section class="section-contactos" id="contactos">
        <h3>contactos</h3>
    </section>
    <footer>
        <samp>leynda</samp>
    </footer>
    <script>
        const menu=document.querySelector('.navegacio-menu');
    
        const burgerButton=document.querySelector('#buger-button');

        const xButton=document.querySelector('#x-button');
        
        const menuIcon=document.querySelector('.menu-imagen')

        const buttonX=document.querySelector('.icon-x')

        burgerButton.addEventListener('click',abrirMenu);
        buttonX.addEventListener('click',cerrarMenu);


        function abrirMenu() {
            if (menu.classList.contains('deactivate')) {
                menu.classList.remove('deactivate')
                xButton.classList.remove('active')
                menuIcon.classList.remove('active')
            }
    
            else
            {
                xButton.classList.add('active');
                menuIcon.classList.add('active')
            }
            
        }
        
        function cerrarMenu()
        {
            if (xButton.classList.contains('icon-x') ) {
                xButton.classList.add('active')
                menuIcon.classList.add('active')
                menu.classList.add('deactivate')
            }
        }
        
    </script>
</body>
</html>
